<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>watsonx × KugelAudio</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #111111;
    --bg-elev-2: #161616;
    --border: #1f1f1f;
    --border-strong: #2a2a2a;
    --fg: #ededed;
    --fg-muted: #8a8a8a;
    --fg-subtle: #5a5a5a;
    --accent: #5e6ad2;
    --accent-hover: #6d78d9;
    --success: #00c896;
    --danger: #ef4444;
    --radius: 8px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    font-size: 14px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
  }
  @supports (font-variation-settings: normal) {
    html, body { font-family: 'InterVariable', sans-serif; }
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    background: var(--bg);
  }
  .brand {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.02em;
    color: var(--fg);
  }
  .brand span { color: var(--fg-muted); font-weight: 400; }
  .spacer { flex: 1; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--fg-muted);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-elev);
  }
  .status .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--fg-subtle);
  }
  .status.healthy .dot { background: var(--success); box-shadow: 0 0 0 3px rgba(0,200,150,.12); }
  .status.down .dot { background: var(--danger); }

  main {
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }
  .lede {
    color: var(--fg-muted);
    font-size: 14px;
    margin-bottom: 8px;
  }

  .card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field-label {
    font-size: 12px;
    color: var(--fg-muted);
    font-weight: 500;
  }

  .voice-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .voice-chip {
    padding: 6px 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev-2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--fg-muted);
    cursor: pointer;
    transition: all 100ms;
    font-family: inherit;
  }
  .voice-chip:hover { color: var(--fg); border-color: var(--border-strong); }
  .voice-chip.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .voice-chip .lang {
    color: var(--fg-subtle);
    margin-left: 4px;
    font-size: 11px;
  }
  .voice-chip.active .lang { color: var(--fg-subtle); }

  textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--fg);
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: vertical;
    min-height: 88px;
    width: 100%;
    outline: none;
    transition: border-color 100ms;
  }
  textarea:focus { border-color: var(--border-strong); }
  textarea::placeholder { color: var(--fg-subtle); }

  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-elev-2);
    color: var(--fg);
    cursor: pointer;
    transition: all 100ms;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button:hover:not(:disabled) { border-color: var(--border-strong); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  button.primary:hover:not(:disabled) {
    background: #ffffff;
    border-color: #ffffff;
  }
  button.icon {
    padding: 8px;
    aspect-ratio: 1;
  }
  button.recording {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }

  .response {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .response-bubble {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    min-height: 52px;
    font-size: 14px;
    color: var(--fg);
    white-space: pre-wrap;
  }
  .response-bubble.empty { color: var(--fg-subtle); }
  .response-bubble.thinking { color: var(--fg-muted); }

  audio {
    width: 100%;
    height: 36px;
    filter: invert(0.92) hue-rotate(180deg);
  }

  .meta-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--fg-muted);
  }
  .meta-item { display: flex; gap: 4px; }
  .meta-item b { color: var(--fg); font-weight: 500; }

  .error {
    border-color: var(--danger);
    color: #fca5a5;
    background: rgba(239, 68, 68, 0.06);
    font-size: 13px;
    padding: 10px 12px;
  }
  .hidden { display: none !important; }

  footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    color: var(--fg-subtle);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--fg-muted); text-decoration: none; }
  footer a:hover { color: var(--fg); }
</style>
</head>
<body>

<header>
  <div class="brand">watsonx <span>×</span> KugelAudio</div>
  <div class="spacer"></div>
  <div id="status" class="status"><span class="dot"></span><span id="statusText">checking…</span></div>
</header>

<main>
  <div>
    <h1>Voice demo</h1>
    <div class="lede">Type a message. The response is generated, then spoken by a KugelAudio voice.</div>
  </div>

  <section class="card">
    <div>
      <div class="field-label" style="margin-bottom:8px">Voice</div>
      <div id="voiceRow" class="voice-row"></div>
    </div>

    <div>
      <div class="field-label" style="margin-bottom:8px">Message</div>
      <textarea id="input" placeholder="e.g. Ich habe Probleme mit meiner Rechnung vom letzten Monat."></textarea>
    </div>

    <div class="actions">
      <button id="submit" class="primary">Generate <span style="opacity:.5">↵</span></button>
      <button id="mic" class="icon" title="Speak (Web Speech API)">🎙</button>
      <div class="spacer"></div>
      <span id="micHint" class="field-label"></span>
    </div>

    <div id="error" class="response-bubble error hidden"></div>
  </section>

  <section class="card response">
    <div class="field-label">Response</div>
    <div id="responseText" class="response-bubble empty">Waiting for input…</div>
    <audio id="player" controls class="hidden"></audio>
    <div id="metaRow" class="meta-row hidden">
      <div class="meta-item"><span>Latency</span><b id="metaLatency">—</b></div>
      <div class="meta-item"><span>Intent</span><b id="metaIntent">—</b></div>
      <div class="meta-item"><span>Sample rate</span><b id="metaSr">—</b></div>
    </div>
  </section>
</main>

<footer>
  <a href="/api/health" target="_blank">/api/health</a>
  &nbsp;·&nbsp;
  <a href="/api/voices" target="_blank">/api/voices</a>
</footer>

<script>
  const $ = (id) => document.getElementById(id);
  const statusEl = $('status');
  const statusText = $('statusText');
  const voiceRow = $('voiceRow');
  const input = $('input');
  const submitBtn = $('submit');
  const micBtn = $('mic');
  const micHint = $('micHint');
  const responseText = $('responseText');
  const player = $('player');
  const errorEl = $('error');
  const metaRow = $('metaRow');
  const metaLatency = $('metaLatency');
  const metaIntent = $('metaIntent');
  const metaSr = $('metaSr');

  let selectedVoiceId = 977; // Dominik Grund (DE) as a sensible default
  let sessionId = null;

  // Curated set — we only surface a handful of voices as chips to keep the UI lean.
  const curated = [
    { id: 977, name: 'Dominik', lang: 'DE' },
    { id: 978, name: 'Lea',     lang: 'DE' },
    { id: 980, name: 'Marius',  lang: 'DE' },
    { id: 1018, name: 'Emma',   lang: 'EN' },
    { id: 1009, name: 'Geronimo', lang: 'EN' },
    { id: 285, name: 'Angela',  lang: 'EN' },
  ];

  function renderVoices() {
    voiceRow.innerHTML = '';
    curated.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'voice-chip' + (v.id === selectedVoiceId ? ' active' : '');
      btn.innerHTML = `${v.name}<span class="lang">${v.lang}</span>`;
      btn.addEventListener('click', () => {
        selectedVoiceId = v.id;
        renderVoices();
      });
      voiceRow.appendChild(btn);
    });
  }

  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      const d = await r.json();
      if (r.ok && d.status === 'healthy') {
        statusEl.classList.add('healthy');
        statusText.textContent = 'live';
      } else {
        statusEl.classList.add('down');
        statusText.textContent = 'degraded';
      }
    } catch {
      statusEl.classList.add('down');
      statusText.textContent = 'offline';
    }
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.remove('hidden');
  }
  function clearError() { errorEl.classList.add('hidden'); }

  async function submit() {
    const text = input.value.trim();
    if (!text) return;
    clearError();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Generating…';
    responseText.textContent = 'Thinking…';
    responseText.className = 'response-bubble thinking';
    player.classList.add('hidden');
    metaRow.classList.add('hidden');

    try {
      const r = await fetch('/api/converse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voiceId: selectedVoiceId, sessionId }),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${r.status}`);
      }
      const d = await r.json();
      sessionId = d.sessionId;

      responseText.textContent = d.responseText;
      responseText.className = 'response-bubble';

      player.src = `data:${d.audioMime};base64,${d.audio}`;
      player.classList.remove('hidden');
      player.play().catch(() => {});

      metaLatency.textContent = `${d.processingTime}ms`;
      metaIntent.textContent = d.intent || '—';
      metaSr.textContent = `${d.sampleRate} Hz`;
      metaRow.classList.remove('hidden');
    } catch (e) {
      responseText.textContent = 'Waiting for input…';
      responseText.className = 'response-bubble empty';
      showError(e.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Generate <span style="opacity:.5">↵</span>';
    }
  }

  submitBtn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submit();
  });

  // Web Speech API — Chrome/Edge only, optional nice-to-have for mic input.
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.disabled = true;
    micBtn.title = 'Web Speech API unavailable in this browser';
  } else {
    const recog = new SR();
    recog.continuous = false;
    recog.interimResults = false;
    let listening = false;

    micBtn.addEventListener('click', () => {
      if (listening) { recog.stop(); return; }
      recog.lang = selectedVoiceId === 1018 || selectedVoiceId === 1009 || selectedVoiceId === 285 ? 'en-US' : 'de-DE';
      try { recog.start(); } catch {}
    });

    recog.onstart = () => {
      listening = true;
      micBtn.classList.add('recording');
      micHint.textContent = 'listening…';
    };
    recog.onresult = (ev) => {
      const transcript = Array.from(ev.results).map(r => r[0].transcript).join(' ');
      input.value = transcript;
    };
    recog.onerror = (ev) => {
      micHint.textContent = `mic error: ${ev.error}`;
    };
    recog.onend = () => {
      listening = false;
      micBtn.classList.remove('recording');
      setTimeout(() => { micHint.textContent = ''; }, 2000);
    };
  }

  renderVoices();
  checkHealth();
</script>
</body>
</html>
