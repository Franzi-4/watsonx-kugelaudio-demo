<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>watsonx · Voice Agent · IBM Demo</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<style>
  :root {
    --bg: #ffffff;
    --bg-1: #fafafa;
    --bg-2: #f4f4f5;
    --border: rgba(0,0,0,0.08);
    --border-2: rgba(0,0,0,0.18);
    --fg: #0a0a0a;
    --fg-2: #525252;
    --fg-3: #737373;
    --fg-4: #a3a3a3;
    --success: #10a86e;
    --danger: #dc2626;
    --radius: 8px;
    --radius-sm: 5px;
    --mono: 'Geist Mono', ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    font-size: 13px;
    line-height: 1.55;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
  }
  @supports (font-variation-settings: normal) {
    html, body { font-family: 'InterVariable', sans-serif; }
  }
  body { height: 100vh; display: flex; flex-direction: column; }

  /* ─── header ─────────────────────────────────────────── */
  header {
    height: 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .brand-mark {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: var(--fg);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    letter-spacing: -0.05em;
  }
  .brand-sep { color: var(--fg-4); font-weight: 400; }
  .brand-sub { color: var(--fg-2); font-weight: 400; }
  .spacer { flex: 1; }
  .hdr-actions { display: flex; align-items: center; gap: 10px; }
  .chip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-2);
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: default;
  }
  .chip.clickable { cursor: pointer; transition: border-color 100ms, color 100ms; }
  .chip.clickable:hover { border-color: var(--border-2); color: var(--fg); }
  .chip .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--fg-4); }
  .chip.healthy .dot { background: var(--success); box-shadow: 0 0 6px rgba(12,206,107,.5); }
  .chip.down .dot { background: var(--danger); }
  .chip .arrow { width: 9px; height: 9px; }

  button.clear-btn {
    font: inherit;
    font-size: 11px;
    color: var(--fg-2);
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    transition: all 100ms;
  }
  button.clear-btn:hover { color: var(--fg); border-color: var(--border-2); }

  /* ─── stack bar (replaces purple banner) ─────────────── */
  .stack-bar {
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 11px;
  }
  .stack-bar .label {
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
    margin-right: 4px;
  }
  .stack-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--fg-2);
    padding: 3px 7px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-1);
  }
  .stack-item .d { width: 5px; height: 5px; border-radius: 50%; background: var(--fg-4); }
  .stack-item.ok .d { background: var(--success); }
  .stack-item.ok { color: var(--fg); }
  .stack-sep { color: var(--fg-4); }

  /* ─── scenario switcher (segmented, product-toggle style) ─ */
  .scenario-bar {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
    background: var(--bg-1);
  }
  .scenario-toggle {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }
  .scenario-tab {
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    padding: 7px 16px 7px 12px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg-2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 140ms ease;
    white-space: nowrap;
  }
  .scenario-tab:hover { color: var(--fg); }
  .scenario-tab.active {
    background: var(--fg);
    color: var(--bg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .scenario-tab-icon {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--bg-2);
    color: var(--fg-2);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 140ms ease;
  }
  .scenario-tab-icon svg { width: 13px; height: 13px; }
  .scenario-tab.active .scenario-tab-icon {
    background: rgba(255,255,255,0.16);
    color: var(--bg);
  }
  .scenario-tab-sub {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--fg-4);
    margin-left: 2px;
  }
  .scenario-tab.active .scenario-tab-sub {
    color: rgba(255,255,255,0.55);
  }

  .scenario-hint {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 16px 0;
    font-size: 12px;
    color: var(--fg-2);
    text-align: center;
    line-height: 1.5;
  }
  .scenario-hint b { color: var(--fg); font-weight: 500; }

  .suggestions-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    align-items: center;
  }
  .suggestions-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
    white-space: nowrap;
  }
  .suggestion-chip {
    font: inherit;
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg-1);
    color: var(--fg-2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 100ms;
    max-width: 420px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suggestion-chip:hover { color: var(--fg); border-color: var(--border-2); }

  /* ─── voice chips ────────────────────────────────────── */
  .voice-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 5px;
    overflow-x: auto;
    flex-shrink: 0;
    align-items: center;
  }
  .voice-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;
  }
  .voice-chip {
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 999px;
    font-size: 11px;
    color: var(--fg-2);
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all 80ms;
  }
  .voice-chip:hover { color: var(--fg); border-color: var(--border-2); }
  .voice-chip.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .voice-chip .lang {
    color: var(--fg-4);
    margin-left: 5px;
    font-family: var(--mono);
    font-size: 10px;
  }
  .voice-chip.active .lang { color: var(--bg); opacity: 0.45; }

  /* ─── thread ─────────────────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 16px 16px;
  }
  .thread {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px 60px;
  }
  .empty-state h2 {
    color: var(--fg);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .empty-state .lede {
    color: var(--fg-2);
    font-size: 13px;
    max-width: 520px;
    margin: 0 auto 28px;
  }
  .empty-state .hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-3);
  }

  /* Two-card scenario chooser on the empty state */
  .scenario-choice {
    max-width: 820px;
    margin: 0 auto 28px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 14px;
    text-align: left;
  }
  .scenario-choice-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px 18px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
  }
  .scenario-choice-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--fg);
    opacity: 0;
    transition: opacity 140ms ease;
    border-radius: 12px 12px 0 0;
  }
  .scenario-choice-card:hover {
    border-color: var(--border-2);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  }
  .scenario-choice-card:hover::before { opacity: 1; }

  .scenario-choice-card .head {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .scenario-choice-card .icon-badge {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg-2);
    color: var(--fg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .scenario-choice-card .icon-badge svg { width: 20px; height: 20px; }
  .scenario-choice-card .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .scenario-choice-card .tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .scenario-choice-card .desc {
    font-size: 13px;
    color: var(--fg-2);
    line-height: 1.55;
  }
  .scenario-choice-card .ideal {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--fg-3);
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    line-height: 1.5;
  }
  .scenario-choice-card .start {
    align-self: flex-start;
    margin-top: 4px;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--fg);
    background: var(--fg);
    color: var(--bg);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform 120ms ease, background 120ms;
  }
  .scenario-choice-card .start:hover { transform: scale(1.02); background: #000; }
  .scenario-choice-card .start .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 0 rgba(16,168,110,0.7);
    animation: pulse 1.6s infinite;
  }
  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 22px;
    background: var(--fg);
    color: var(--bg);
    border: 1px solid var(--fg);
    border-radius: 999px;
    cursor: pointer;
    margin: 4px 0 18px;
    transition: transform 120ms ease, background 120ms;
    letter-spacing: -0.01em;
  }
  .hero-cta:hover { transform: scale(1.02); background: #000; }
  .hero-cta .pulse {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 0 rgba(16,168,110,0.7);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(16,168,110,0.7); }
    70% { box-shadow: 0 0 0 10px rgba(16,168,110,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,168,110,0); }
  }

  .empty-state .hint kbd {
    font-family: var(--mono);
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--fg-2);
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 82%;
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg-role {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--fg-4);
  }
  .msg-bubble {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: var(--fg);
    background: var(--bg-1);
  }
  .msg.user .msg-bubble {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .msg-audio {
    margin-top: 6px;
    width: 100%;
    height: 28px;
    outline: none;
  }
  .msg-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-3);
    margin-top: 4px;
    letter-spacing: 0;
  }
  .msg-meta b { color: var(--fg-2); font-weight: 500; }

  .typing {
    display: inline-flex;
    gap: 3px;
    align-items: center;
  }
  .typing span {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--fg-3);
    animation: blink 1.4s infinite ease-in-out both;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.15; }
    40% { opacity: 1; }
  }

  /* ─── composer ───────────────────────────────────────── */
  .composer {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .composer-inner {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }
  .composer-box {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    padding: 7px 7px 7px 12px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 120ms;
  }
  .composer-box:focus-within { border-color: var(--border-2); }
  textarea {
    background: transparent;
    border: none;
    color: var(--fg);
    padding: 6px 0;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    min-height: 20px;
    max-height: 180px;
    flex: 1;
    outline: none;
  }
  textarea::placeholder { color: var(--fg-4); }
  button.icon {
    font: inherit;
    width: 30px; height: 30px;
    padding: 0;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg-2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 100ms;
    flex-shrink: 0;
  }
  button.icon:hover { color: var(--fg); border-color: var(--border); }
  button.icon:disabled { opacity: 0.3; cursor: not-allowed; }
  button.icon svg { width: 14px; height: 14px; }
  button.icon.send {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  button.icon.send:hover:not(:disabled) { background: #fff; border-color: #fff; }
  button.icon.send:disabled { background: var(--fg-4); border-color: var(--fg-4); color: var(--bg); }
  button.icon.recording { color: var(--danger); border-color: var(--danger); }

  .composer-meta {
    max-width: 680px;
    margin: 6px auto 0;
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-4);
  }
  .composer-meta kbd {
    font-family: var(--mono);
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 10px;
    color: var(--fg-3);
  }

  .banner-error {
    max-width: 680px;
    margin: 0 auto 10px;
    padding: 9px 12px;
    border: 1px solid rgba(220,38,38,0.3);
    color: #991b1b;
    background: rgba(220,38,38,0.04);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: var(--mono);
  }
  .hidden { display: none !important; }

  /* ─── live voice mode ────────────────────────────────── */
  .live-launch {
    max-width: 680px;
    margin: 0 auto 10px;
    display: flex;
    justify-content: center;
  }
  .live-launch button {
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-1);
    color: var(--fg-2);
    cursor: pointer;
    transition: all 120ms;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .live-launch button:hover { color: var(--fg); border-color: var(--border-2); }
  .live-launch .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--danger);
    box-shadow: 0 0 0 0 rgba(220,38,38,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  }

  #liveOverlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px;
  }
  #liveOverlay.active { display: flex; }
  .live-orb {
    --mic-level: 0;
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-1);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: border-color 300ms, background 300ms;
  }
  /* Live waveform canvas fills the orb */
  #orbWave {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms;
  }
  .live-orb.listening #orbWave { opacity: 1; }

  /* Three concentric expanding rings, driven off --mic-level */
  .orb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms;
  }
  .live-orb.listening .orb-ring { border-color: rgba(16,168,110,0.45); opacity: 1; }
  .live-orb.listening .orb-ring-1 { transform: scale(calc(1 + var(--mic-level) * 0.35)); opacity: calc(0.9 - var(--mic-level) * 0.3); }
  .live-orb.listening .orb-ring-2 { transform: scale(calc(1.1 + var(--mic-level) * 0.55)); opacity: calc(0.5 - var(--mic-level) * 0.2); }
  .live-orb.listening .orb-ring-3 { transform: scale(calc(1.22 + var(--mic-level) * 0.8));  opacity: calc(0.28 - var(--mic-level) * 0.08); }

  .live-orb.listening { border-color: #10a86e; background: rgba(16,168,110,0.04); transform: scale(calc(1 + var(--mic-level) * 0.06)); }
  .live-orb.thinking { border-color: var(--fg-3); background: var(--bg-1); }
  .live-orb.speaking { border-color: var(--fg); background: var(--bg-2); }
  .live-orb.speaking::after {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(10,10,10,0.1);
    animation: speakPulse 1.4s ease-in-out infinite;
  }
  @keyframes speakPulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50%      { transform: scale(1.08); opacity: 0.15; }
  }

  .live-meter {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .live-meter .bar {
    width: 80px; height: 4px;
    background: var(--bg-2);
    border-radius: 2px;
    overflow: hidden;
  }
  .live-meter .fill {
    height: 100%;
    width: calc(var(--mic-level, 0) * 100%);
    background: linear-gradient(90deg, #10a86e, #10a86e 70%, #f59e0b);
    transition: width 60ms linear;
  }
  .live-warn {
    font-family: var(--mono);
    font-size: 11px;
    color: #b45309;
    text-align: center;
    max-width: 440px;
    line-height: 1.5;
  }
  .live-warn.hidden { display: none; }
  .live-warn a { color: inherit; text-decoration: underline; }

  /* Fallback text input inside the live overlay for browsers where
     Web Speech isn't actually working (Dia, Arc, Brave in some configs). */
  .live-fallback {
    width: min(520px, 90vw);
    display: flex;
    gap: 6px;
    padding: 6px 6px 6px 12px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    align-items: center;
  }
  .live-fallback input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    font-size: 14px;
    color: var(--fg);
    padding: 6px 0;
  }
  .live-fallback input::placeholder { color: var(--fg-4); }
  .live-fallback button {
    font: inherit;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--fg);
    background: var(--fg);
    color: var(--bg);
    cursor: pointer;
  }
  .live-fallback button:disabled { opacity: 0.4; cursor: not-allowed; }

  .orb-inner {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg-3);
    text-align: center;
  }
  .live-orb.listening .orb-inner { color: var(--success); }
  .live-orb.speaking .orb-inner { color: var(--fg); }

  .live-transcript {
    max-width: 600px;
    text-align: center;
    font-size: 18px;
    color: var(--fg);
    line-height: 1.5;
    min-height: 54px;
    letter-spacing: -0.01em;
  }
  .live-transcript.interim { color: var(--fg-3); font-style: italic; }
  .live-transcript.empty { color: var(--fg-4); font-size: 14px; }

  .live-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-3);
    text-align: center;
  }
  .live-stop {
    font: inherit;
    font-size: 12px;
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    transition: all 120ms;
  }
  .live-stop:hover { background: var(--bg-2); border-color: var(--border-2); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">w</div>
    <span>watsonx</span>
    <span class="brand-sep">/</span>
    <span class="brand-sub">Voice Agent</span>
  </div>
  <div class="spacer"></div>
  <div class="hdr-actions">
    <a id="orchLaunch" class="chip clickable" href="https://eu-de.watson-orchestrate.cloud.ibm.com/chat" target="_blank" rel="noopener">
      Orchestrate console
      <svg class="arrow" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h6v6M10 2L3 9" stroke-linecap="round"/></svg>
    </a>
    <button id="clearBtn" class="clear-btn">Clear</button>

</header>

<div class="stack-bar">
  <span class="label">stack</span>
  <span class="stack-item" id="s-orch"><span class="d"></span>watsonx Orchestrate</span>
  <span class="stack-sep">·</span>
  <span class="stack-item" id="s-wx"><span class="d"></span>watsonx.ai / llama-3-3-70b</span>
  <span class="stack-sep">·</span>
  <span class="stack-item" id="s-gov"><span class="d"></span>watsonx.governance</span>
  <span class="stack-sep">·</span>
  <span class="stack-item" id="s-kugel"><span class="d"></span>KugelAudio</span>
</div>

<div class="scenario-bar" id="scenarioBar">
  <div class="scenario-toggle" role="tablist" id="scenarioToggle"></div>
</div>

<main id="main">
  <div class="thread" id="thread">
    <div class="empty-state" id="emptyState">
      <h2 id="emptyTitle">Voice Agent</h2>
      <div class="lede hidden" id="emptyLede"></div>
      <button id="heroStartBtn" class="hero-cta">
        <span class="pulse"></span>
        Gespräch starten
      </button>
      <div class="hint"><kbd>⌘</kbd> <kbd>↵</kbd> senden · <kbd>Esc</kbd> beenden</div>
    </div>
  </div>
</main>

<div class="composer">
  <div id="errorBanner" class="banner-error hidden"></div>
  <div class="live-launch">
    <button id="goLiveBtn" title="Hands-free conversation mode">
      <span class="pulse"></span>
      Start live conversation
    </button>
    <button id="lkProbeBtn" title="LiveKit audio quality probe — bypasses our SSE/PCM scheduler" style="margin-left:8px;background:transparent;border:1px dashed var(--border-2);color:var(--fg-2);">
      LiveKit-Audio-Test
    </button>
  </div>
  <div class="composer-inner">
    <div class="composer-box">
      <textarea id="input" placeholder="Ask anything…" rows="1"></textarea>
      <button id="micBtn" class="icon" title="Dictate">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="2" width="4" height="8" rx="2"/><path d="M3 8a5 5 0 0010 0M8 13v2" stroke-linecap="round"/></svg>
      </button>
      <button id="sendBtn" class="icon send" title="Send">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 8h10M9 4l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

    </div>
  </div>
</div>

<div id="liveOverlay">
  <div id="liveOrb" class="live-orb">
    <div class="orb-inner" id="orbState">idle</div>
  </div>

  <div id="liveWarn" class="live-warn hidden"></div>
  <div class="live-fallback">
    <input id="liveFallbackInput" type="text" placeholder="oder tippen, falls das Mikro nicht geht …" autocomplete="off" />

<!-- LiveKit JS SDK (Phase 2a audio quality probe). Not on the critical path
     for the existing SSE-based flow — only loaded for the LK-Probe button. -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.7/dist/livekit-client.umd.min.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const statusEl = $('status');
  const statusText = $('statusText');
  const voiceRow = $('voiceRow');
  const thread = $('thread');
  const emptyState = $('emptyState');
  const input = $('input');
  const sendBtn = $('sendBtn');
  const micBtn = $('micBtn');
  const micHint = $('micHint');
  const clearBtn = $('clearBtn');
  const errorBanner = $('errorBanner');
  const main = $('main');

  // Default to a specific voice so consecutive requests stay on the same
  // speaker. The "Zufall"-chip (voice_id null) lets the server pick a
  // random voice each request — useful for testing, useless for a demo.
  let selectedVoiceId = 977;
  let sessionId = null;
  let sending = false;
  let scenarios = [];
  let selectedScenarioId = null;

  const voices = [
    { id: 977, name: 'Dominik', lang: 'DE' },
    { id: 978, name: 'Lea', lang: 'DE' },
    { id: 980, name: 'Marius', lang: 'DE' },
    { id: 979, name: 'Sara', lang: 'DE' },
    { id: 1018, name: 'Emma', lang: 'EN' },
    { id: 1009, name: 'Geronimo', lang: 'EN' },
    { id: 285, name: 'Angela', lang: 'EN' },
    { id: 289, name: 'Lukas', lang: 'EN' },
    { id: 911, name: 'Lars', lang: 'NL' },
    { id: 912, name: 'Rosa', lang: 'NL' },
    { id: 744, name: 'Dawid', lang: 'PL' },
    { id: 849, name: 'Ana', lang: 'SL' },
    { id: null, name: 'Zufall', lang: '?' },
  ];

  const scenarioToggle = $('scenarioToggle');
  const emptyTitle = $('emptyTitle');
  const emptyLede = $('emptyLede');

  function currentScenario() {
    return scenarios.find((s) => s.id === selectedScenarioId) || scenarios[0];
  }

  const SHORT_LABELS = {
    claims: 'Schadensmeldung',
    hotline: 'Bürgerhotline',
  };

  function renderScenarios() {
    scenarioToggle.innerHTML = '';
    scenarios.forEach((s) => {
      const isActive = s.id === selectedScenarioId;
      const tab = document.createElement('button');
      tab.type = 'button';
      tab.setAttribute('role', 'tab');
      tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
      tab.className = 'scenario-tab' + (isActive ? ' active' : '');
      tab.textContent = SHORT_LABELS[s.id] || s.shortLabel || s.label;
      tab.onclick = () => selectScenario(s.id);
      scenarioToggle.appendChild(tab);
    });
  }

  // No more suggestion chips — landing stays minimal.
  function renderSuggestions() {}

  function applyScenarioEmptyState() {
    const s = currentScenario();
    if (!s) return;
    if (emptyTitle) emptyTitle.textContent = s.label;
    if (emptyLede) emptyLede.textContent = s.description;
  }

  async function selectScenario(id, { auto = false } = {}) {
    if (id === selectedScenarioId && !auto) return;
    selectedScenarioId = id;
    // A scenario swap changes the system prompt, so start a fresh session.
    sessionId = null;
    renderScenarios();
    renderSuggestions();
    applyScenarioEmptyState();
    resetThread();
    // Auto-greet only on explicit user action — browsers block autoplay otherwise.
    if (!auto) {
      await startScenarioConversation();
    }
  }

  // Entry point for the hero "Gespräch starten" button. Opens the live overlay,
  // plays the agent's greeting through the shared AudioContext, then hands off
  // to the live-listening loop so the conversation is fully hands-free.
  async function startScenarioConversation() {
    const s = currentScenario();
    if (!s) return;
    const ready = await ensureLiveReady();
    if (!ready) return;

    liveActive = true;
    liveOverlay.classList.add('active');
    hideLiveWarn();
    setOrbState('speaking');
    liveBuffer = '';
    liveTranscript.className = 'live-transcript';
    liveTranscript.textContent = '';

    try {
      const startBody = { scenarioId: s.id, sessionId };
      if (selectedVoiceId !== null) startBody.voiceId = selectedVoiceId;
      const r = await fetch('/api/scenario/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(startBody),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      sessionId = d.sessionId;

      thread.innerHTML = '';
      addMessage({
        role: 'assistant',
        text: d.greeting,
        meta: `${s.label} · Kugel Audio · ${d.sampleRate}Hz`,
      });
      liveTranscript.textContent = d.greeting;

      await playBase64Wav(d.audio);
      if (liveActive) startLiveListening();
    } catch (e) {
      showError(`Konnte Gespräch nicht starten: ${e.message}`);
      liveStop();
    }
  }

  function resetThread() {
    thread.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.id = 'emptyState';

    const cardsHtml = scenarios.map((s) => {
      return `
        <div class="scenario-choice-card" data-scenario="${s.id}">
          <div class="head">
            <div>
              <div class="title">${s.label}</div>
            </div>
          </div>
          <div class="desc">${s.description}</div>
          ${s.idealFor ? `<div class="ideal">${s.idealFor}</div>` : ''}
          <button type="button" class="start" data-start="${s.id}">
            <span class="pulse"></span>
            Gespräch starten
          </button>
        </div>`;
    }).join('');

    empty.innerHTML = `
      <h2>Voice Agent · IBM × Kugel Audio Demo</h2>
      <div class="lede">Zwei deutsche Voice-Agents, beide mit watsonx.ai Llama 3.3 70B und Kugel-Audio-Readback. Wähle ein Szenario — der Agent meldet sich zuerst.</div>
      <div class="scenario-choice">${cardsHtml}</div>
      <div class="hint">oder unten tippen · <kbd>⌘</kbd> <kbd>↵</kbd> antworten · <kbd>Esc</kbd> Live beenden</div>`;
    thread.appendChild(empty);

    empty.querySelectorAll('[data-start]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-start');
        if (id && id !== selectedScenarioId) {
          selectedScenarioId = id;
          sessionId = null;
          renderScenarios();
          renderSuggestions();
        }
        await startScenarioConversation();
      });
    });
  }

  async function loadScenarios() {
    try {
      const r = await fetch('/api/scenarios');
      const d = await r.json();
      scenarios = d.scenarios || [];
      selectedScenarioId = d.defaultScenarioId || (scenarios[0] && scenarios[0].id) || null;
    } catch {
      scenarios = [];
    }
    renderScenarios();
    renderSuggestions();
    // Replace the static initial empty state with the dual-scenario picker
    // once scenarios are known — so the two cases are front-and-centre.
    if (scenarios.length) resetThread();
    else applyScenarioEmptyState();
  }

  function renderVoices() {
    voiceRow.innerHTML = '';
    voices.forEach(v => {
      const b = document.createElement('button');
      b.className = 'voice-chip' + (v.id === selectedVoiceId ? ' active' : '');
      b.innerHTML = `${v.name}<span class="lang">${v.lang}</span>`;
      b.onclick = () => { selectedVoiceId = v.id; renderVoices(); };
      voiceRow.appendChild(b);
    });
  }

  function scrollToBottom() {
    requestAnimationFrame(() => { main.scrollTop = main.scrollHeight; });
  }

  function addMessage({ role, text, audioUrl, meta }) {
    emptyState?.remove();
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const roleLabel = document.createElement('div');
    roleLabel.className = 'msg-role';
    roleLabel.textContent = role === 'user' ? 'you' : 'watsonx';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (text === 'typing') {
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      bubble.textContent = text;
    }
    msg.append(roleLabel, bubble);
    if (audioUrl) {
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = audioUrl;
      audio.className = 'msg-audio';
      audio.autoplay = true;
      msg.appendChild(audio);
    }
    if (meta) {
      const metaEl = document.createElement('div');
      metaEl.className = 'msg-meta';
      metaEl.innerHTML = meta;
      msg.appendChild(metaEl);
    }
    thread.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      const d = await r.json();
      if (r.ok && d.status === 'healthy') {
        statusEl.classList.add('healthy');
        statusText.textContent = 'live';
      } else {
        statusEl.classList.add('down');
        statusText.textContent = 'degraded';
      }
      if (d.orchestrate?.launch_url) {
        $('orchLaunch').href = d.orchestrate.launch_url;
      }
      const svc = d.services || {};
      const flip = (id, ok) => $(id).classList.toggle('ok', ok);
      flip('s-orch', svc.watsonx_orchestrate === 'provisioned');
      flip('s-wx', svc.watsonx_ai === 'up');
      flip('s-gov', svc.watsonx_governance === 'provisioned');
      flip('s-kugel', svc.kugelaudio === 'up');
    } catch {
      statusEl.classList.add('down');
      statusText.textContent = 'offline';
    }
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.remove('hidden');
    setTimeout(() => errorBanner.classList.add('hidden'), 6000);
  }

  async function send() {
    const text = input.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';
    addMessage({ role: 'user', text });
    const pending = addMessage({ role: 'assistant', text: 'typing' });

    try {
      const convBody = { text, sessionId, scenarioId: selectedScenarioId };
      if (selectedVoiceId !== null) convBody.voiceId = selectedVoiceId;
      const r = await fetch('/api/converse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(convBody),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${r.status}`);
      }
      const d = await r.json();
      sessionId = d.sessionId;
      pending.remove();
      addMessage({
        role: 'assistant',
        text: d.responseText,
        audioUrl: `data:${d.audioMime};base64,${d.audio}`,
        meta: `llama-3-3-70b · <b>${d.processingTime}ms</b> · ${d.sampleRate}Hz`,
      });
    } catch (e) {
      pending.remove();
      showError(e.message);
    } finally {
      sending = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 180) + 'px';
  }
  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', () => {
    sessionId = null;
    resetThread();
  });

  // ─── Live voice mode ─────────────────────────────────
  const liveOverlay = $('liveOverlay');
  const liveOrb = $('liveOrb');
  const orbState = $('orbState');
  const liveTranscript = $('liveTranscript');
  const goLiveBtn = $('goLiveBtn');
  const heroStartBtn = $('heroStartBtn');
  const liveStopBtn = $('liveStopBtn');
  const SRctor = window.SpeechRecognition || window.webkitSpeechRecognition;

  let liveActive = false;
  let liveRecog = null;
  let liveAudio = null;          // legacy HTMLAudioElement (unused once audioCtx is alive)
  let liveSilenceTimer = null;
  let liveBuffer = '';
  let audioCtx = null;           // created on user gesture in ensureLiveReady()
  let currentSource = null;      // active AudioBufferSourceNode, for stop()
  let micStream = null;          // persistent mic MediaStream for the level meter
  let micAnalyser = null;
  let micMeterRaf = null;
  let watchdogTimer = null;      // fires if no speech is ever picked up
  const LIVE_SILENCE_MS = 800;
  const AUDIOSTART_WATCHDOG_MS = 2500;   // if onaudiostart never fires → browser blocks Web Speech
  const SPEECH_WATCHDOG_MS = 9000;       // if mic's alive but no words recognised
  const liveWarn = $('liveWarn');
  const micFill = $('micFill');
  const liveFallbackInput = $('liveFallbackInput');
  const liveFallbackSend = $('liveFallbackSend');
  let audioStartWatchdog = null;
  let speechWatchdog = null;

  // Decode base64 WAV → AudioBuffer and play through the shared AudioContext.
  // Resolves when playback ends. Using AudioContext (not <audio>) because
  // sequential HTMLAudioElement.play() calls hit browser autoplay limits
  // once the original user-gesture activation token is consumed.
  async function playBase64Wav(b64) {
    if (!audioCtx) return;
    // Chrome suspends AudioContext while Web Speech holds the mic — resume
    // before every playback so response audio actually leaves the speakers.
    if (audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (e) { console.warn('resume failed', e); }
    }
    return new Promise((resolve) => {
      const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
      audioCtx.decodeAudioData(
        bytes.buffer.slice(0),
        (buffer) => {
          try {
            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(audioCtx.destination);
            currentSource = src;
            src.onended = () => {
              if (currentSource === src) currentSource = null;
              resolve();
            };
            src.start(0);
          } catch (e) {
            console.warn('audio start failed', e);
            resolve();
          }
        },
        (err) => {
          console.warn('decodeAudioData failed', err);
          resolve();
        },
      );
    });
  }

  // Gapless PCM playback for the streaming TTS path. Each chunk is raw
  // pcm_s16le at the session's sample rate. Two protections against
  // audible stutter:
  //   1. Jitter buffer — collect JITTER_MS of audio before starting playback
  //      so a brief network/TTS hiccup doesn't drain the queue.
  //   2. Cursor never trails currentTime — scheduling always pushes forward,
  //      so consecutive chunks line up sample-accurate on the audio clock.
  const PCM_JITTER_MS = 220;
  let pcmCursor = 0;                  // ctx-time at which the NEXT chunk should start
  let pcmPending = [];                // pre-jitter buffer (AudioBuffers waiting to start)
  let pcmStarted = false;
  const pcmActiveSources = new Set();
  let pcmDoneResolve = null;   // resolves when the last scheduled source ends

  function resetPcmStream() {
    // Cancel any pending "all done" promise so the previous turn's
    // pcmStreamFinished doesn't block if resetPcmStream is called early.
    if (pcmDoneResolve) { const r = pcmDoneResolve; pcmDoneResolve = null; r(); }
    for (const s of pcmActiveSources) { try { s.stop(); } catch {} }
    pcmActiveSources.clear();
    pcmPending = [];
    pcmStarted = false;
    pcmCursor = 0;
  }

  function _scheduleAudioBuffer(buffer) {
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(audioCtx.destination);
    const safeNow = audioCtx.currentTime + 0.005; // 5ms scheduling safety
    const startAt = Math.max(pcmCursor, safeNow);
    src.start(startAt);
    pcmCursor = startAt + buffer.duration;
    pcmActiveSources.add(src);
    src.onended = () => {
      pcmActiveSources.delete(src);
      // Notify pcmStreamFinished when the last source finishes.
      if (pcmActiveSources.size === 0 && pcmDoneResolve) {
        const r = pcmDoneResolve;
        pcmDoneResolve = null;
        r();
      }
    };
  }

  function _decodePcm(b64, sampleRate) {
    const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
    const int16 = new Int16Array(bytes.buffer, bytes.byteOffset, bytes.byteLength / 2);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
    const buffer = audioCtx.createBuffer(1, float32.length, sampleRate);
    buffer.copyToChannel(float32, 0);
    return buffer;
  }

  // enqueuePcmChunk assumes the AudioContext is already running (caller's
  // responsibility). The async resume inside is a defensive fallback only.
  async function enqueuePcmChunk(b64, sampleRate) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') {
      // Should not happen — the SSE audio handler resumes before calling us.
      console.warn('[pcm] AudioContext still suspended in enqueuePcmChunk');
      try { await audioCtx.resume(); } catch {}
    }
    const buffer = _decodePcm(b64, sampleRate);

    if (!pcmStarted) {
      pcmPending.push(buffer);
      const buffered = pcmPending.reduce((s, b) => s + b.duration, 0);
      if (buffered * 1000 < PCM_JITTER_MS) return;
      // Anchor the cursor a hair into the future so the first scheduled
      // start time is reachable, then drain the pre-buffer back-to-back.
      pcmCursor = audioCtx.currentTime + 0.02;
      for (const buf of pcmPending) _scheduleAudioBuffer(buf);
      pcmPending = [];
      pcmStarted = true;
    } else {
      _scheduleAudioBuffer(buffer);
    }
  }

  // Wait for all scheduled PCM sources to finish playing.
  // Uses onended events (event-based) rather than a timing estimate so it works
  // correctly even when AudioContext was suspended mid-stream. Falls back to a
  // wall-clock timeout in case onended never fires (e.g. context stays suspended).
  function pcmStreamFinished() {
    if (!audioCtx) return Promise.resolve();
    // Flush any chunks that never crossed the jitter threshold (short response).
    if (!pcmStarted && pcmPending.length) {
      pcmCursor = audioCtx.currentTime + 0.02;
      for (const buf of pcmPending) _scheduleAudioBuffer(buf);
      pcmPending = [];
      pcmStarted = true;
    }
    // Nothing was ever scheduled — return immediately.
    if (!pcmStarted) return Promise.resolve();
    // All sources already ended before we got here — return immediately.
    if (pcmActiveSources.size === 0) return Promise.resolve();
    // Otherwise wait for the last source's onended callback.
    return new Promise((resolve) => {
      pcmDoneResolve = resolve;
      // Safety timeout: if onended never fires (suspended context that never
      // resumes), give up after the estimated remaining time + 2 s.
      const remaining = Math.max(0, pcmCursor - audioCtx.currentTime);
      setTimeout(() => {
        if (pcmDoneResolve) { pcmDoneResolve = null; resolve(); }
      }, remaining * 1000 + 2000);
    });
  }

  function setOrbState(s) {
    liveOrb.classList.remove('listening', 'thinking', 'speaking');
    if (s && s !== 'idle') liveOrb.classList.add(s);
    orbState.textContent = s;
  }

  function clearLiveSilenceTimer() {
    if (liveSilenceTimer) { clearTimeout(liveSilenceTimer); liveSilenceTimer = null; }
  }

  // Explicitly grant mic + unlock AudioContext on a user gesture. Keeps the
  // mic stream alive so we can drive a level meter — this is how the user
  // sees that the mic is actually capturing even if transcription is silent.
  async function ensureLiveReady() {
    if (!SRctor) {
      showError('Live voice mode needs Chrome or Edge (Web Speech API).');
      return false;
    }
    try {
      if (!micStream || !micStream.getTracks().some(t => t.readyState === 'live')) {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }
    } catch (e) {
      showError('Mikrofonzugriff verweigert — Berechtigung erteilen und erneut versuchen.');
      return false;
    }
    try {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
      }
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      if (!micAnalyser) {
        const source = audioCtx.createMediaStreamSource(micStream);
        micAnalyser = audioCtx.createAnalyser();
        micAnalyser.fftSize = 512;
        micAnalyser.smoothingTimeConstant = 0.6;
        source.connect(micAnalyser);
        startMicMeter();
      }
    } catch (e) {
      console.warn('AudioContext setup failed', e);
    }
    return true;
  }

  function startMicMeter() {
    if (micMeterRaf) return;
    const buf = new Uint8Array(micAnalyser.fftSize);
    const canvas = $('orbWave');
    const ctx = canvas?.getContext('2d');
    const W = canvas?.width || 0;
    const H = canvas?.height || 0;
    const loop = () => {
      micMeterRaf = requestAnimationFrame(loop);
      micAnalyser.getByteTimeDomainData(buf);

      // RMS → --mic-level drives CSS ring scale + meter bar
      let sumSq = 0;
      for (let i = 0; i < buf.length; i++) {
        const v = (buf[i] - 128) / 128;
        sumSq += v * v;
      }
      const rms = Math.sqrt(sumSq / buf.length);
      const level = Math.min(1, rms * 6);
      liveOrb.style.setProperty('--mic-level', level.toFixed(3));
      if (micFill) micFill.style.width = `${Math.round(level * 100)}%`;

      // Live waveform — visible inside the orb whenever mic is alive
      if (ctx && W && H) {
        ctx.clearRect(0, 0, W, H);
        ctx.lineWidth = 2;
        ctx.strokeStyle = liveOrb.classList.contains('listening')
          ? '#10a86e'
          : 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        const step = W / buf.length;
        const mid = H / 2;
        // Amplify the waveform a bit so it's clearly visible even for quiet speech
        const gain = 1 + level * 2;
        for (let i = 0; i < buf.length; i++) {
          const v = ((buf[i] - 128) / 128) * gain;
          const y = mid + v * (H * 0.38);
          const x = i * step;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    };
    loop();
  }

  function stopMicMeter() {
    if (micMeterRaf) { cancelAnimationFrame(micMeterRaf); micMeterRaf = null; }
    liveOrb.style.setProperty('--mic-level', 0);
    if (micFill) micFill.style.width = '0%';
  }

  function clearWatchdog() {
    if (watchdogTimer) { clearTimeout(watchdogTimer); watchdogTimer = null; }
    if (audioStartWatchdog) { clearTimeout(audioStartWatchdog); audioStartWatchdog = null; }
    if (speechWatchdog) { clearTimeout(speechWatchdog); speechWatchdog = null; }
  }

  function showLiveWarn(msg) {
    if (!liveWarn) return;
    liveWarn.textContent = msg;
    liveWarn.classList.remove('hidden');
  }
  function hideLiveWarn() {
    if (!liveWarn) return;
    liveWarn.classList.add('hidden');
  }

  async function liveStart() {
    const ok = await ensureLiveReady();
    if (!ok) return;
    liveActive = true;
    liveOverlay.classList.add('active');
    liveBuffer = '';
    hideLiveWarn();
    liveTranscript.className = 'live-transcript empty';
    liveTranscript.textContent = 'Sprechen Sie, um zu starten …';
    startLiveListening();
  }

  function liveStop() {
    liveActive = false;
    clearLiveSilenceTimer();
    clearWatchdog();
    if (liveRecog) { try { liveRecog.abort(); } catch {} liveRecog = null; }
    if (currentSource) { try { currentSource.stop(); } catch {} currentSource = null; }
    resetPcmStream();
    if (liveAudio) { liveAudio.pause(); liveAudio.src = ''; liveAudio = null; }
    liveOverlay.classList.remove('active');
    hideLiveWarn();
    setOrbState('idle');
  }

  function startLiveListening() {
    if (!liveActive) return;
    setOrbState('listening');
    const v = voices.find(x => x.id === selectedVoiceId);
    const lang = ({ DE: 'de-DE', EN: 'en-US', NL: 'nl-NL', PL: 'pl-PL', SL: 'sl-SI' })[v?.lang] || 'de-DE';

    liveRecog = new SRctor();
    liveRecog.continuous = true;
    liveRecog.interimResults = true;
    liveRecog.lang = lang;

    liveBuffer = '';
    hideLiveWarn();
    liveTranscript.className = 'live-transcript empty';
    liveTranscript.textContent = 'Ich höre zu …';

    // Two-stage watchdog so we can differentiate the failure modes:
    //   1) onaudiostart never fires (~2.5s) → the browser itself blocks the
    //      Web Speech backend (Dia, Arc, Brave, Firefox). Tell user to type.
    //   2) onaudiostart fires but no speech/result (~9s) → mic is alive but
    //      not picking up words. Could be silent mic or noisy env.
    clearWatchdog();
    audioStartWatchdog = setTimeout(() => {
      if (!liveActive) return;
      showLiveWarn('Dein Browser blockt die Spracherkennung. Bitte Chrome oder Edge nutzen — oder hier unten tippen.');
      liveFallbackInput?.focus();
    }, AUDIOSTART_WATCHDOG_MS);

    liveRecog.onaudiostart = () => {
      if (audioStartWatchdog) { clearTimeout(audioStartWatchdog); audioStartWatchdog = null; }
      speechWatchdog = setTimeout(() => {
        if (liveActive && !liveBuffer) {
          showLiveWarn('Keine Sprache erkannt. Mikro-Pegel muss ausschlagen, wenn Sie sprechen.');
        }
      }, SPEECH_WATCHDOG_MS);
    };

    liveRecog.onspeechstart = () => { clearWatchdog(); hideLiveWarn(); };

    liveRecog.onresult = (ev) => {
      clearWatchdog();
      hideLiveWarn();
      let finalText = '';
      let interimText = '';
      for (let i = 0; i < ev.results.length; i++) {
        const chunk = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) finalText += chunk;
        else interimText += chunk;
      }
      const combined = (finalText + interimText).trim();
      if (combined) {
        liveBuffer = combined;
        liveTranscript.className = 'live-transcript' + (interimText && !finalText ? ' interim' : '');
        liveTranscript.textContent = combined;
      }
      // (re)start the silence countdown on any new speech activity
      clearLiveSilenceTimer();
      liveSilenceTimer = setTimeout(() => {
        if (liveActive && liveBuffer.trim().length > 1) {
          try { liveRecog.stop(); } catch {}
        }
      }, LIVE_SILENCE_MS);
    };

    liveRecog.onerror = (ev) => {
      if (ev.error === 'no-speech' || ev.error === 'aborted') return;
      if (ev.error === 'network') {
        showLiveWarn('Web-Speech-API offline — Spracherkennung braucht Internet. Weiter mit Tastatur unten.');
      } else {
        showError(`Live mic: ${ev.error}`);
      }
      // try to recover
      if (liveActive) setTimeout(() => startLiveListening(), 800);
    };

    liveRecog.onend = async () => {
      clearLiveSilenceTimer();
      clearWatchdog();
      if (!liveActive) return;
      if (liveBuffer.trim().length > 1) {
        await liveSubmit(liveBuffer.trim());
      } else {
        // nothing captured — restart listening
        startLiveListening();
      }
    };

    try { liveRecog.start(); } catch (e) {
      showError(`Couldn't start listening: ${e.message}`);
    }
  }

  async function liveSubmit(text) {
    if (!liveActive) return;
    // Chrome suspends AudioContext while Web Speech holds the mic. Resume it
    // NOW — before the TTS stream starts — so every enqueuePcmChunk call hits
    // a running context synchronously. Without this, pcmStreamFinished() reads
    // pcmCursor=0 and returns immediately on turn 2, handing the mic back
    // before any audio has been scheduled.
    if (audioCtx && audioCtx.state === 'suspended') {
      try { await audioCtx.resume(); } catch (e) { console.warn('audioCtx resume failed', e); }
    }
    setOrbState('thinking');
    liveTranscript.className = 'live-transcript';
    liveTranscript.textContent = text;

    addMessage({ role: 'user', text });
    const pending = addMessage({ role: 'assistant', text: 'typing' });

    // Streaming TTS: each `audio` event carries one PCM chunk that we
    // schedule back-to-back on the AudioContext clock for gapless playback.
    resetPcmStream();
    let speakingStarted = false;
    let streamDone = false;
    let fullTextSoFar = '';
    let finalMeta = null;

    try {
      const reqBody = { text, sessionId, scenarioId: selectedScenarioId };
      if (selectedVoiceId !== null) reqBody.voiceId = selectedVoiceId;
      const r = await fetch('/api/converse/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(reqBody),
      });
      if (!r.ok || !r.body) throw new Error(`stream HTTP ${r.status}`);

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        // split by SSE record boundary
        let sep;
        while ((sep = buf.indexOf('\n\n')) !== -1) {
          const record = buf.slice(0, sep);
          buf = buf.slice(sep + 2);
          const lines = record.split('\n');
          let event = 'message', data = '';
          for (const line of lines) {
            if (line.startsWith('event: ')) event = line.slice(7).trim();
            else if (line.startsWith('data: ')) data += line.slice(6);
          }
          if (!data) continue;
          let payload;
          try { payload = JSON.parse(data); } catch { continue; }

          if (event === 'session') {
            sessionId = payload.sessionId;
          } else if (event === 'delta') {
            fullTextSoFar += payload.text;
            liveTranscript.textContent = fullTextSoFar;
          } else if (event === 'audio') {
            if (!speakingStarted) { speakingStarted = true; setOrbState('speaking'); }
            // Ensure AudioContext is running before scheduling this chunk.
            // Chrome can re-suspend the context during any prior await
            // (fetch, reader.read), so we check on every chunk, not just
            // at the top of liveSubmit. This guarantees enqueuePcmChunk
            // runs synchronously (no internal await), keeping pcmCursor
            // accurate when pcmStreamFinished is called after the loop.
            if (audioCtx?.state === 'suspended') {
              try { await audioCtx.resume(); } catch {}
            }
            enqueuePcmChunk(payload.pcm, payload.sampleRate);
          } else if (event === 'done') {
            fullTextSoFar = payload.responseText || fullTextSoFar;
            const llm = payload.llmMs != null ? ` · LLM <b>${payload.llmMs}ms</b>` : '';
            const ttfa = payload.ttsTtfa != null ? ` · TTS-TTFA <b>${payload.ttsTtfa}ms</b>` : '';
            finalMeta = `llama-3-3-70b → kugel-2 · <b>${payload.processingTime}ms</b>${llm}${ttfa}`;
            streamDone = true;
          } else if (event === 'error') {
            throw new Error(payload.message || 'stream error');
          }
        }
      }
      // Wait for the queued PCM to finish playing before listening again,
      // otherwise the agent would talk over itself.
      await pcmStreamFinished();
      pending.remove();
      addMessage({
        role: 'assistant',
        text: fullTextSoFar.trim(),
        meta: finalMeta || `llama-3-3-70b · streamed`,
      });
      if (liveActive) startLiveListening();
    } catch (e) {
      pending.remove();
      showError(e.message);
      if (liveActive) setTimeout(() => startLiveListening(), 800);
    }
  }

  goLiveBtn?.addEventListener('click', liveStart);
  heroStartBtn?.addEventListener('click', startScenarioConversation);
  liveStopBtn?.addEventListener('click', liveStop);

  // ─── Phase 2a: LiveKit audio-quality probe ───────────────────
  // Joins a LiveKit room as a passive listener; the Python agent
  // (livekit_agent.py) joins the same room and speaks one greeting via
  // Kugel TTS over a native WebRTC audio track. The browser plays it
  // through <audio> — no PCM scheduling, no per-chunk resampling.
  // If this sounds clearly cleaner than our SSE flow, Phase 2b is worth it.
  const lkProbeBtn = $('lkProbeBtn');
  let lkRoom = null;
  async function lkProbe() {
    if (!window.LivekitClient) {
      showError('LiveKit JS SDK nicht geladen — Reload?');
      return;
    }
    const { Room, RoomEvent } = window.LivekitClient;
    try {
      lkProbeBtn.disabled = true;
      lkProbeBtn.textContent = 'verbinde …';
      const r = await fetch('/api/livekit/token?room=audio-probe-' + Date.now());
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.message || `token HTTP ${r.status}`);
      }
      const { url, token } = await r.json();

      if (lkRoom) { try { await lkRoom.disconnect(); } catch {} }
      lkRoom = new Room({ adaptiveStream: false, dynacast: false });

      lkRoom.on(RoomEvent.TrackSubscribed, (track, _pub, participant) => {
        if (track.kind === 'audio') {
          // Native WebRTC playback — browser handles buffering, jitter,
          // and resampling internally. This is the whole point of the probe.
          const el = track.attach();
          el.autoplay = true;
          el.style.display = 'none';
          document.body.appendChild(el);
          lkProbeBtn.textContent = 'Agent spricht …';
        }
      });
      lkRoom.on(RoomEvent.Disconnected, () => {
        lkProbeBtn.disabled = false;
        lkProbeBtn.textContent = 'LiveKit-Audio-Test';
      });

      await lkRoom.connect(url, token);
      lkProbeBtn.textContent = 'warte auf Agent …';
    } catch (e) {
      showError(`LiveKit probe: ${e.message}`);
      lkProbeBtn.disabled = false;
      lkProbeBtn.textContent = 'LiveKit-Audio-Test';
    }
  }
  lkProbeBtn?.addEventListener('click', lkProbe);

  // Fallback typing inside the live overlay — works in browsers where
  // Web Speech is blocked (Dia, Arc, etc.). Routes through the same
  // liveSubmit path so the agent answers via Kugel TTS just like voice.
  async function liveFallbackSubmit() {
    const text = liveFallbackInput?.value?.trim();
    if (!text || !liveActive) return;
    liveFallbackInput.value = '';
    if (liveRecog) { try { liveRecog.abort(); } catch {} liveRecog = null; }
    clearLiveSilenceTimer();
    clearWatchdog();
    await liveSubmit(text);
  }
  liveFallbackSend?.addEventListener('click', liveFallbackSubmit);
  liveFallbackInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      liveFallbackSubmit();
    }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && liveActive) liveStop();
  });

  // Web Speech API — dictation
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.disabled = true;
    micBtn.title = 'Web Speech API not supported in this browser (use Chrome or Edge)';
  } else {
    let recog = null;
    let listening = false;
    let micPermissionGranted = false;

    // Explicit mic permission so Safari / locked-down Chrome prompts the user.
    async function ensureMicPermission() {
      if (micPermissionGranted) return true;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
        micPermissionGranted = true;
        return true;
      } catch (e) {
        const name = e?.name || 'permission';
        showError(
          name === 'NotAllowedError' || name === 'SecurityError'
            ? 'Microphone access denied — enable it in browser settings and click 🎙 again.'
            : `Microphone unavailable: ${name}`
        );
        return false;
      }
    }

    // Human-readable labels for SpeechRecognition error codes.
    const errLabels = {
      'not-allowed': 'Microphone permission denied.',
      'service-not-allowed': 'Browser refused to use the speech service.',
      'network': 'Speech recognition server unreachable (Web Speech API requires internet).',
      'no-speech': 'No speech detected — try again.',
      'audio-capture': 'No microphone detected.',
      'aborted': '',  // silent: happened because we stopped it
      'bad-grammar': 'Grammar error.',
      'language-not-supported': 'Language not supported by this browser.',
    };

    micBtn.addEventListener('click', async () => {
      if (listening) {
        try { recog?.stop(); } catch {}
        return;
      }
      const ok = await ensureMicPermission();
      if (!ok) return;

      // Fresh recognizer each time — Chrome sometimes refuses to restart the same instance.
      recog = new SR();
      recog.continuous = false;
      recog.interimResults = true;
      recog.maxAlternatives = 1;
      const v = voices.find(v => v.id === selectedVoiceId);
      recog.lang = ({ DE: 'de-DE', EN: 'en-US', NL: 'nl-NL', PL: 'pl-PL', SL: 'sl-SI' })[v?.lang] || 'en-US';

      recog.onstart = () => {
        listening = true;
        micBtn.classList.add('recording');
        micHint.textContent = `listening (${recog.lang})…`;
      };
      recog.onresult = (ev) => {
        // Stream interim transcript into the textarea so the user sees words appear live.
        let finalText = '';
        let interimText = '';
        for (let i = 0; i < ev.results.length; i++) {
          const chunk = ev.results[i][0].transcript;
          if (ev.results[i].isFinal) finalText += chunk;
          else interimText += chunk;
        }
        input.value = (finalText + interimText).trim();
        autoResize();
      };
      recog.onerror = (ev) => {
        const label = errLabels[ev.error] ?? `Dictation error: ${ev.error}`;
        if (label) showError(label);
        micHint.textContent = '';
      };
      recog.onend = () => {
        listening = false;
        micBtn.classList.remove('recording');
        micHint.textContent = '';
      };

      try {
        recog.start();
      } catch (e) {
        showError(`Couldn't start dictation: ${e.message}`);
        listening = false;
        micBtn.classList.remove('recording');
      }
    });
  }

  renderVoices();
  loadScenarios();
  checkHealth();
  input.focus();
</script>
</body>
</html>
